name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 1. Instalar dependencias
        run: npm ci

      - name: 2. Compilar el proyecto
        run: npm run build

      - name: 3. Ejecutar los tests unitarios con Vitest
        run: npm test -- --run

      - name: 4. Generar el reporte de cobertura
        run: npm run test:coverage

      - name: 5. Ejecutar análisis estático con ESLint
        run: npm run lint

      - name: 6. Instalar dependencias del sistema y navegadores de Playwright
        run: npx playwright install --with-deps

      - name: 7. Ejecutar los tests de aceptación con Playwright
        run: npm run at

      - name: Guardar reporte de Playwright si ocurre un fallo
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: ci-pipeline
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Descargar información de Vercel (Pull)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Compilar artefactos para Vercel (Build)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Desplegar a Vercel (Deploy)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}